<!DOCTYPE html>
<html lang="zh-cmn-Hans">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no">
        <meta name="format-detection" content="telephone=no,email=no,date=no,address=no">
        <meta name="apple-mobile-web-app-status-bar-style" content="black">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <meta name="application-name" content="网站名称">
        <meta name="applicable-device" content="pc,mobile">
        <meta name="renderer" content="webkit">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta http-equiv="Cache-Control" content="no-transform">
        <meta http-equiv="Cache-Control" content="no-siteapp">
        <title> 关键字输入提示词条</title>
        <meta name="keywords" content="">
        <meta name="description" content="">
    </head>
    <body>
        <style>
            body,
            html {
                width: 100%;
                height: 100%;
                margin: 0;
                font-family: "微软雅黑";
                font-size: 14px;
            }
            #l-map {
                height: 300px;
                width: 100%;
            }
            #r-result {
                width: 100%;
            }
        </style>

        <div id="l-map"></div>
        
        <!-- 关键字输入框 -->
        <div id="r-result">
            请输入:
            <input type="text" id="suggestId" size="20" value="" style="width: 150px">
        </div>

        <!-- 鼠标移动到下拉选项时的临时词条信息 -->
        <div id="searchResultPanel" style=" border: 1px solid #c0c0c0; width: 150px; height: auto; display: none; " ></div>

        <!-- ================================================================================-->
        <!--                             JAVASCRIPT                                          -->
        <!-- ================================================================================-->
        <script src="http://api.map.baidu.com/api?v=2.0&ak=KmYpNYDatEVqdNvwvDXsbbOvQhTvPg9X"></script> <!--百度地图api文件-->
        <script>
            var map = new BMap.Map("l-map");
            map.centerAndZoom("泉州", 12); // 初始化地图,设置城市和地图级别。


            //——————————————————————————————————————————
            // 百度地图输入下拉功能
            var mapInstance = map;
            function G(id) {
                return document.getElementById(id);
            }
            var ac = new BMap.Autocomplete({ // 建立一个自动完成的对象
                input: "suggestId",
                location: map,
            });
            // ac.setInputValue('泉州浦西万达广场'); // 设置输入框默认值
            // ac.setLocation('福州市'); // 更改检索区域
            ac.addEventListener("onhighlight", function (e) {
                // 鼠标放在下拉列表上的事件
                var str = "";
                var _value = e.fromitem.value;
                var value = "";
                if (e.fromitem.index > -1) {
                    value =
                        _value.province +
                        _value.city +
                        _value.district +
                        _value.street +
                        _value.business;
                }
                str =
                    "FromItem<br />index = " +
                    e.fromitem.index +
                    "<br />value = " +
                    value;

                value = "";
                if (e.toitem.index > -1) {
                    _value = e.toitem.value;
                    value =
                        _value.province +
                        _value.city +
                        _value.district +
                        _value.street +
                        _value.business;
                }
                str +=
                    "<br />ToItem<br />index = " +
                    e.toitem.index +
                    "<br />value = " +
                    value;
                G("searchResultPanel").innerHTML = str;
            });

            var myValue;
            ac.addEventListener("onconfirm", function (e) {
                // 鼠标点击下拉列表后的事件
                var _value = e.item.value;
                // console.log('_value：', _value); // 下拉选中的名称、所在城市、区县。但没有坐标信息
                myValue =
                    _value.province +
                    _value.city +
                    _value.district +
                    _value.street +
                    _value.business;
                G("searchResultPanel").innerHTML =
                    "onconfirm<br />index = " +
                    e.item.index +
                    "<br />myValue = " +
                    myValue;
                // var results = ac.getResults(); // 这里是所有下拉项的信息，也没有坐桃城
                // console.log('results：', results)
                setPlace(); // 地点定位并取到坐标
            });

           // 获取下拉选中项的坐标
           function setPlace() {
                mapInstance.clearOverlays(); // 清除地图上所有覆盖物

                // // 方法1：使用地点检索。配额不够，1天最多100次。超过配额度时检索不出来
                // function myFun() {
                //     var result = local.getResults();
                //     var total = result.getNumPois(); // 结果总数
                //     console.log('total：', total);
                //     if(total > 0) {
                //         var pp = result.getPoi(0).point; // 获取第一个智能搜索的结果
                //         // var lng = pp.lng, lat = pp.lat; // 下拉选项的坐标信息
                //         // 创建标注点
                //         // map.centerAndZoom(pp, 18);
                //         // map.addOverlay(new BMap.Marker(pp)); // 添加标注
                //     }
                // }
                // var local = new BMap.LocalSearch(mapInstance, {
                //     onSearchComplete: myFun // 智能搜索
                // });
                // local.search(myValue);


                // 方法2：使用地理编码。配额足够，1天最多5000次
                var address = myValue;
                var city = '泉州市';
                city = getCityName(city);
                // console.log('city-x：', city,'\nmyValue-x：', myValue);
                getAddressCoordinateByGeoCoder(address, city, function(point) {
                    // console.log('point：', point)
                    if(point) {
                        // 创建标注点
                        mapInstance.centerAndZoom(point, 16);
                        mapInstance.addOverlay(new BMap.Marker(point)); // 添加标注
                    }
                });


            }



            /**
             * 获取位置坐标：使用地理编码服务
             * 说明：
             * 1、返回值只有坐标、没有地址、电话、邮编等信息
             * 2、配额足够，1天最多5000次
             * @param {String} address 位置名称、地点名称
             * @param {String} city 指定城市
             * @param {Function} callback 回调函数。参数格式：{"point类型的坐标"}
             */
            function getAddressCoordinateByGeoCoder(address, city, callback){
                var geo = new BMap.Geocoder(); // 创建地理编码实例
                // 对指定的地址进行解析
                geo.getPoint(address, function(point) {
                    if (point) {
                        // 解析成功：返回坐标
                        callback(point);
                    } else {
                        // 解析失败
                        callback(null);
                    }
                }, city);
            }



            /**
             * 从地点字符串中提取城市名称
             * @param {String} 地点字符串。eg. '福建省-泉州市-丰泽区', '福建省-泉州市', '福建省-泉州', '泉州市', '泉州'
             * @returns {String} 返回城市名。eg. 泉州市, 泉州
             */
            function getCityName (str) {
                // 提取城市名(支持：省-市-区/单独市/城)
                var reg = /^(?:.+?-)?([^-]+?市?)(?:-.+)?$/;
                var result = str.match(reg);
                return result ? result[1] : '';
            }
            
        </script>
    </body>
</html>
