    <style>
        * {
            margin: 0;
            padding: 0;
            -webkit-box-sizing: border-box;

        ::-webkit-input-placeholder{ /* color: #bfbfbf; */ color: #e2dcdc; font-size: 12px; } ::-moz-placeholder{ color: #e2dcdc; font-size: 12px; } 
        :-moz-placeholder{ color: #e2dcdc; font-size: 12px; } 
        :-ms-input-placeholder{ color: #e2dcdc; font-size: 12px; }
        html, body { font-size: 14px; }
        body { padding: 10px 15px; overflow: hidden; }
        .graph { position: relative; border: 1px solid #ddd; border-radius: 4px; }
        .graph__search { position: absolute; z-index: 1; top: 1px; left: 0; right: 0; width: 100%; margin: 0 auto; padding: 20px 15px; background-color: #fff; border: 1px solid #ededed; border-radius: 4px; box-shadow: 0 1px 2px #c7c7c7; }

        .graph__search_box_text input[type="text"] { width: 200px; padding: 8px 8px; border: 1px solid #ddd; border-radius: 4px; }
        #c-community { width: 320px; }
        .graph__search_box_text button[type="button"] { padding: 6px 8px; border-radius: 2px; cursor: pointer; color: #fff!important; border: solid 1px #1b9af7; background: #1b9af7; background: -webkit-gradient(linear, left top, left bottom, from(#42a8f3), to(#98d3e7)); background: -moz-linear-gradient(top,  #42a8f3,  #98d3e7); background: linear-gradient(to left bottom, #98d3e7, #42a8f3); filter:  progid:DXImageTransform.Microsoft.gradient(startColorstr='#42a8f3', endColorstr='#98d3e7'); }
        .graph__search_box_text button[type="button"]:hover {opacity: .7; filter: alpha(opacity=70); filter: Progid:DXImageTransform.Microsoft.Alpha(opacity=70); }

            opacity: .7; filter: alpha(opacity=70); filter: Progid:DXImageTransform.Microsoft.Alpha(opacity=70); }

        /*+ 文本标注 +*/
        .BMapLabel.ne__bd_lb { border: 0 !important; background: transparent !important; }
        .ne__bd_lb_text { position: relative; background-color: #fff; padding: 12px 25px; border-width: 1px; border-style: solid; border-color: #19b6f8; border-radius: 3px; box-shadow: 0 1px 3px 0px #3291b9; color: #0c88e8; font-size: 15px; font-weight: bold; }
        .ne__bd_lb_text.blue { border-color: #1296db; color: #1296db; }
        .ne__bd_lb_text:before { content: ''; position: absolute; bottom: -8px; left: 0; right: 0; margin: 0 auto; display: block; width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 15px solid #fff; }

        /*+ 媒体查询 +*/
        @media screen and (max-width: 1280px) {
            .graph__search { padding: 10px 5px; }
            .graph__search_box_text input[type="text"] { width: 180px!important; font-size: 12px; }
            .graph__search_box_btn { margin-left: 0; }
            .graph__search_box_btn button[type="button"] { padding: 8px 5px; font-size: 12px; }
        }
    </style>

    <script src="http://api.map.baidu.com/api?v=2.0&ak=KmYpNYDatEVqdNvwvDXsbbOvQhTvPg9X"></script> <!--百度地图api文件-->
    <script>
        //========================================================================================
        //                          一、默认参数设置
        //========================================================================================
        //————————————————————————————————————————————————
        // 全局变量
        // 设置默认中心点 ajax({})
        var g_default_coordinate = '118.602828,24.897513'; // 中心点坐标，即楼盘坐标
        var g_default_title = '泉州古城'; // 中心点名称，即楼盘名称






        //========================================================================================
        //                          二、封装百度地图插件
        //========================================================================================
        //------------------------------------------------
        // START: 插件开始
        //------------------------------------------------
        ;(function (root, factory) {
            if (typeof define === 'function' && define.amd) {
                define(['jquery', 'underscore'], factory);
            } else if (typeof exports === 'object') {
                module.exports = factory(require('jquery'), require('underscore'));
            } else {
                root.NeMapExample = factory(root.jQuery, root._);
            }
        })(this, function ($, _) {
            

            function ToolTip(str) {
                utils.dialog(str);
            }


            //————————————————————————————————————————————————
            //      构造函数
            //————————————————————————————————————————————————
            /**
             * 构造函数
             */
            function Widget(options){
                var me = this;
                var defaults = {
                    container: "", // 地图容器节点ID选择器，默认空(必须)。eg. '#container'。注：值为空时不执行
                    centerPoint: "118.59, 24.91", // 地图中心点坐标(可选)
                    centerCity: "", // 中心点城市，默认空(可选)
                    centerTitle: "", // 中心点显示文本，默认空(可选)
                    zoom: 13, // 默认缩放级别，默认13(可选)。值：3-19
                    picker: {
                        enable: true, // 是否开启坐标拾取功能，默认true(可选)
                        trigger: '', // 绑定坐标拾取输入框的id或className属性，默认空(可选)。绑定后点击地图或点击点标注，或者拖拽点标注时将把当前坐标显示在输入框上
                    },
                    clickCenterCreateNew: true, // 点击地图时是否重建中心点，默认true(可选)
                    createBack: null, // 初始化后回调(可选)。参数：lng: "经度", lat: "纬度", instance: "地图实例化对象"
                    autoComplete: { // 关键字自动完成检索功能
                        enable: true, // 是否启用该功能，默认true
                        trigger: '', // 绑定触发自动完成检索的输入框ID属性，默认空
                        callBack: null // 选中下拉项后的回调(可选)。参数对象： title: "地点名", city: "所在城市", district: "所在区县", street: "所在街道", lng: "经度", lat: "纬度", instance: "地图实例化对象"
                    },
                    pointOverLay: { // 点标注(可选)
                        enableDrag: true, // 是否允许拖拽，默认true(可选)
                        clickBack: null, // 点击回调(可选)。参数： lng: "经度", lat: "纬度"
                        dragendBack: null, // 拖拽回调(可选)。参数： lng: "经度", lat: "纬度, e: "对象"
                    },
                    draft: { // 地图底图功能(可选)
                        enableWheelZoom: true // 是否开启鼠标滚轮缩放功能，仅对PC上有效，默认true(可选)
                    }
                }
                var settings = utils.deepMergeOptions(defaults, options);
                // 全局赋值
                me.defaults = defaults;
                me.settings = settings;
                // 地图初始化
                this.init();
            }

            // 给构造函数挂载原型方法
            Widget.prototype = {
                constructor: Widget, // 修复原型链指向

                /**
                 * 初始化
                 */
                init: function(){
                    var me = this;
                    var selector = me.settings.container.toString().replace(/(\#|\.)/g, '');
                    var nodeRoot = document.getElementById(selector);
                    if(nodeRoot == null || typeof nodeRoot == 'undefined') {
                        var tip = '地图根节点不存在，请检查参数[container]';
                        console.warn(tip);
                        utils.dialog(tip);
                        return;
                    }
                    me.$nodeRoot = nodeRoot;

                    // 设置地图根容器大小，防止地图展不开
                    var size = utils.getViewportSize();
                    var w = size.width, h = size.height;
                    // console.log('size：', size);
                    nodeRoot.setAttribute('style', 'position: relative; width: ' + w + 'px; height: ' + h + 'px; overflow: hidden;');

                    // 创建并设置地图子容器大小
                    var containerId = 'ne-bd-container-wrap';
                    var nodeContainer = document.createElement('div');
                    nodeContainer.id = containerId;
                    nodeContainer.setAttribute('style', 'width: 100%; height: 100%; overflow: hidden;');
                    nodeRoot.appendChild(nodeContainer);
                    me.$nodeWrap = nodeContainer;
                    
                    // 创建地图
                    me.createMap(containerId);

                    // 自动完成检索功能
                    if(me.settings.autoComplete.enable) {
                        me.keywordAutoComplete({
                            trigger: me.settings.autoComplete.trigger
                        });
                    }
                },
                
                /**
                 * 创建地图
                 * @param {String} ps_container_id 地图容器节点ID
                 */
                createMap: function(ps_container_id){
                    var me = this;
                    var title = me.settings.centerTitle;
                    var coordinates = me.settings.centerPoint || me.defaults.centerPoint;
                    var pObj = _helpers.getPoint(coordinates);
                    var point = pObj.point, lng = pObj.lng, lat = pObj.lat;
                    // 地图初始化并设置地图展示级别
                    var map = new BMap.Map(ps_container_id); 
                    map.centerAndZoom(point, me.settings.zoom); // 设置地图展示级别、自动调整视野
                    if (me.settings.draft.enableWheelZoom) {
                        map.enableScrollWheelZoom(); // 开启滚轮缩放
                    }
                    me.openPicker(lng, lat); // 开启坐标拾取功能
                    // 全局赋值
                    me.$map = map; // 地图实例化对象

                    // 创建中心点标注
                    me.createMarkerPoint(point, {
                        title: title
                    }); 
                    // 初始化后回调
                    if(me.settings.createBack) {
                        me.settings.createBack({
                            lng: lng,
                            lat: lat,
                            instance: map
                        });
                    }
                    // 点击地图时
                    map.addEventListener('click', function(e){
                        // console.log('e:', e);
                        var point = e.point;
                        var lng = point.lng, lat = point.lat;
                        // console.log('point:', point, ', lng:', lng, ', lat:', lat);
                        // 重建中心点标注
                        if(me.settings.clickCenterCreateNew) {
                            if (e.overlay) return; // 当前有覆盖物时，则不执行点击事件(即在覆盖物上点击时，只执行覆盖物的事件，但不执行地图的事件)
                            var newPoint = _helpers.getPoint(lng + ',' + lat);
                            map.clearOverlays(); // 清除点标注覆盖物。这里后续要改一下 test1
                            me.createMarkerPoint(newPoint);
                            me.openPicker(lng, lat); // 开启坐标拾取功能
                        }
                    });

                    // 窗口大小变化时重置地图容器大小
                    window.addEventListener('resize', function(){
                        var size = utils.getViewportSize();
                        var w = size.width, h = size.height;
                        me.$nodeRoot.setAttribute('style', 'width: ' + w + 'px; height: ' + h + 'px'); // 重置地图大小
                    });
                },


                /**
                 * 创建一个点标注覆盖物
                 * 即： 创建指定坐标的点标注
                 * @param {String|Array} ps_coordinate_str 经纬度坐标字符串或数组。eg. "116.xxx, 29.yyy". eg. ["116.xxx", "29.yyy"]
                 * @param {Object} opts 参数对象
                 */
                createMarkerPoint: function (ps_coordinate_str, opts){
                    var me = this;
                    var originals = {
                        autoViewport: false, // 是否自动调整视野到指定坐标点，默认false(可选)
                        zoom: -1, // 设置地图缩放级别，默认-1表示自动调整(可选)。值3-19之间时将强制调整到指定缩放级别
                        clearAllOverlay: false, // 是否清除所有覆盖物，默认false(可选)
                        clearPointOverlay: false, // 是否清除点标注覆盖物，默认false(可选)
                        title: '' // 点标注的文本，默认空(可选)
                    }
                    var finals = utils.deepMergeOptions(originals, opts);

                    var map = me.$map;
                    if(finals.clearAllOverlay) {
                        map.clearOverlays(); // 清除所有覆盖物
                    }
                    if(finals.clearPointOverlay) {
                        map.clearOverlays(); // 清除点标注覆盖物。这里后续要改一下 test1
                    }
                    
                    var pObj = _helpers.getPoint(ps_coordinate_str);
                    var point = pObj.point, lng = pObj.lng, lat = pObj.lat;
                    var pointMarker = new BMap.Marker(point); // 创建标注    
                    map.addOverlay(pointMarker); // 将点标注添加到地图中
                    me.createMarkerLabel(pointMarker, point, finals.title); // 给点标注添加显示文本

                    // 调整地图视野
                    if(finals.autoViewport) {
                        var _zoom = finals.zoom;
                        if(_zoom > 0) {
                            map.centerAndZoom(point, _zoom); // 调整视野到指定坐标点
                        }
                        else {
                            var points = [ point ];
                            var viewportOptions = {
                                margins: [50, 50, 50, 50] // 地图边缘与坐标点的边距（防止点贴边）
                            };
                            map.setViewport(points, viewportOptions); // 根据坐标点自动调整地图视野
                        }
                    }

                    me.openPicker(lng, lat); // 开启坐标拾取功能
                    // 监听标注事件
                    pointMarker.addEventListener("click", function(e){    
                        // console.log('您点击了标注：', e);
                        if(me.settings.pointOverLay.clickBack) me.settings.pointOverLay.clickBack({
                            lng: e.point.lng,
                            lat: e.point.lat,
                            e: e
                        }); 
                    });
                    if(me.settings.pointOverLay.enableDrag) {
                        pointMarker.enableDragging(); // 允许拖拽标注
                        // 可拖拽的标注
                        pointMarker.addEventListener("dragend", function(e){
                            var point = e.point;
                            var lng = point.lng, lat = point.lat;
                            // console.log('当前位置：', lng, ',', lat);
                            if(me.settings.pointOverLay.dragendBack) me.settings.pointOverLay.dragendBack({
                                lng: lng,
                                lat: lat,
                                e: e
                            });
                            me.openPicker(lng, lat); // 开启坐标拾取功能
                        });
                    }
                },



                /**
                 * 创建一个文本标注覆盖物
                 * @param {PointMarker} point_marker 点标注覆盖物对象
                 * @param {Point} 点标注覆盖物的地理坐标点
                 * @param {String} 文本标注的显示文本名称，即标题
                 */
                createMarkerLabel: function(point_marker, point_coordinate, ps_title){
                    var me = this;
                    var map = me.$map;
                    if(ps_title.toString().replace(/(\s+)/g, '') !== '') {
                        var lb_father_class_name = 'ne__bd_lb', // 父节点样式名
                            lb_class_name = 'ne__bd_lb_text'; // 文本节点样式名
                        var lb_text = '<div class="' + lb_class_name + '">' + ps_title + '</div>';
                        var lb_options = {
                            position: point_coordinate, // 指定文本标注所在的地理位置
                            // offset: new BMap.Size(30, -30) // 设置文本偏移量
                            width: 0,     // 宽度(220-730) 0 自动调整
                            maxWidth: 500,  // 最大宽度(220-730)
                            height: 0,     // 高度(60-650) 0 自动调整
                            offset: { // 位置偏移
                                width: -40,
                                height: -75
                            }
                        }
                        // 创建文本标注覆盖物
                        var lbMark = new BMap.Label(lb_text, lb_options);
                        map.addOverlay(lbMark); // 将文本标注添加到地图中
                        lbMark.enableMassClear(); // 允许覆盖物被清除
                        lbMark.name = 'tag_bd_label'; // 标记覆盖物类型，方便清除指定覆盖物时用
                        lbMark.setStyle({
                            padding: '10px',
                            height: '30px',
                            lineHeight: '30px',
                            // backgroundColor: "#fff",
                            borderRadius: '5px',
                            borderColor: '#ccc',
                            color: 'blue',
                            fontSize: '16px',
                            fontFamily: '微软雅黑'
                        });

                        // 将文本标注绑定到点标注上
                        point_marker.setLabel(lbMark);

                        // 重置文本标注外观
                        setTimeout(function() {
                            var lbNodes = utils.getMultipleNodesByIdClassName(lb_class_name);
                            if(lbNodes.length > 0) {
                                for(var i = 0; i < lbNodes.length; i++) {
                                    var currentNode = lbNodes[i];
                                    var parentNode = currentNode.parentNode;
                                    if(parentNode != null) {
                                        parentNode.classList.add(lb_father_class_name); // 给文本标注父节点添加一个样式名
                                    }
                                }
                            }
                        }, 100);
                    }
                },



                /**
                 * 百度地图API功能：关键字自动完成检索
                 * 即： 输入关键字会有一个相关下拉列表
                 * @param {Object} opts 参数对象
                 */
                keywordAutoComplete: function(opts) {
                    var me = this;
                    var originals = {
                        trigger: '', // 绑定触发自动完成检索的输入框ID属性，默认空
                    }
                    var finals = utils.deepMergeOptions(originals, opts);

                    var _inputClassId = finals.trigger.toString().replace(/(\#|\.)/g, ''); // 输入框节点ID
                    var nodes = utils.getMultipleNodesByIdClassName(_inputClassId);
                    if(nodes.length == 0) {
                        var tip = '您绑定的关键字自动完成检索节点不存在，请检查' + _inputClassId;
                        console.warn(tip);
                        utils.dialog(tip);
                        return;
                    }
                    var elTargetNode = document.getElementById(_inputClassId); // 目标节点
                    var map = me.$map;

                    // 创建一个隐藏区域的节点，用于自动检索用
                    var resultPanelId = 'searchResultPanel';
                    var elNewNode = document.createElement('div');
                    elNewNode.id = resultPanelId;
                    elNewNode.setAttribute('style', 'border: 1px solid #c0c0c0;width: 150px; height: auto; display: none;');
                    elTargetNode.parentNode.insertBefore(elNewNode.cloneNode(true), elTargetNode);

                    var elHideNode = document.getElementById(resultPanelId); // 这里要再定义一个隐藏区域节点对象，不能直接使用 elNewNode，否则隐藏的节点无法使用 .innerHTML 

                    // 建立一个自动完成的对象
                    var ac = new BMap.Autocomplete({
                        input: _inputClassId,
                        location: map  // 绑定地图，缩小检索范围 // 设定返回结果的所属范围。例如“北京市”。String | Map | Point。
                        // ,city: "全国" // 限定城市，可选
                    });

                    // 监听下拉列表显示事件，动态修改层级样式等(Autocomplete无直接事件，可监听输入框input事件)
                    elTargetNode.addEventListener('input', function() {
                        // 延迟获取（确保下拉列表已生成）
                        setTimeout(function() {
                            var suggestionBox = document.querySelector('div[id^="tangram-suggestion"]');
                            if (suggestionBox) {
                                
                                // suggestionBox.style.background = "#f9f9f9";
                                suggestionBox.style.zIndex = 99;
                            }
                        }, 100);
                    });


                    // 输入框聚焦时
                    document.getElementById(_inputClassId).addEventListener('focus', function() {
                        // var coordinate = ''; // 取当前坐标点
                        // var arr = coordinate.split(',');
                        // var lng = arr[0], lat = arr[1];
                        // ac.setLocation(new BMap.Point(lng, lat));
                    });

                    // 鼠标放在下拉列表上的事件、下拉悬浮事件
                    ac.addEventListener("onhighlight", function (e) {
                        // var hoverItem = e.fromitem;
                        // 更新隐藏区域的值(可选)
                        var str = "";
                        var _value = e.fromitem.value;
                        var value = "";
                        if (e.fromitem.index > -1) {
                            value =
                                _value.province +
                                _value.city +
                                _value.district +
                                _value.street +
                                _value.business;
                        }
                        str =
                            "FromItem<br />index = " +
                            e.fromitem.index +
                            "<br />value = " +
                            value;

                 searchPlace: function(address, callback, ps_city) {

                    //     if (point) {

                    //                 lng: lng,

                    //         // myGeo.getLocation(point, function (res) {
                    //         //     console.log("地址详情：", res);
                    //         // });

                    //     else {
                    //         var tip = '抱歉，未解析到坐标，地址可能不完整';
                    //         console.warn(tip);

                    // 方案2：使用地点检索
                    var local = new BMap.LocalSearch(map, {
                        onSearchComplete: function (res) {

                            // 无效地址 → 返回 0 条结果，有效地址 → ≥1 条结果
                            if (res && res.getNumPois() > 0) {
                                // 获取第一个智能搜索的结果
                                // var results = local.getResults();
                                // console.log('result：', results);
                                // var result = results.getPoi(0); // 方法1
                                // var point = result.point;
                                var result = res.getPoi(0); // 方法2
                                var point = result.point; 
                                // console.log('result：', result);
                                var lng = point.lng, lat = point.lat;
                                if(callback) {

                                        placeName: address, // 用户输入的地点名称
                                        
                                        title: result.title, // 结果的名称标题

                                        lat: lat, // 结果的纬度
                                        point: result.point, // 结果的坐标点
                                        province: result.province, // 所在省份
                                        city: result.city, // 所在城市
                                        phoneNumber: result.phoneNumber, // 电话
                                        postcode: result.postcode, // 邮政编码
                                        address: result.address, // 地址（根据数据部分提供）。注：当结果点类型为公交站或地铁站时，地址信息为经过该站点的所有车次
                                        tags: result.tags // POI的标签，如商务大厦、餐馆等
                                    })
                                }
                            } else {
                                var tip = '抱歉，未解析到坐标，地址可能不完整';

                    local.search(address); // 执行检索
                },





                //————————————————————————————————————————————————
                //              以下为私有函数，应抽离
                //————————————————————————————————————————————————
                /**
                 * 开启坐标拾取系统
                 * @param {String} longitude 经度
                 * @param {String} latitude 维度
                 */
                openPicker: function(longitude, latitude) {
                    var me = this;
                    var dPicker = me.settings.picker;
                    if(dPicker.enable) {

                        var nodes = utils.getMultipleNodesByIdClassName(elInput);

                            var tip = '未找到匹配的节点：' + elInput;
                            console.warn(tip);
                            utils.dialog(tip);
                            return;
                        }
                        if (nodes.length > 0) {
                            for (var j = 0; j < nodes.length; j++) {
                                var currentNode = nodes[j];
                                // console.log('当前节点：', currentNode);
                                if (currentNode.tagName.toLocaleLowerCase() === 'input') {
                                    currentNode.value = longitude + ',' + latitude; // 输入框回显
                                }
                            }
                        }
                    }
                },

            };



            //————————————————————————————————————————————————
            // 私有函数
            //————————————————————————————————————————————————
            var _helpers = {
                
                /**
                 * 创建一个坐标点并返回坐标点对象
                 * @param {String|Array} ps_coordinate_str 经纬度坐标字符串或数组。eg. "116.xxx, 29.yyy". eg. ["116.xxx", "29.yyy"]
                 * @returns {Point} 返回坐标点对象
                 */
                getPoint: function(ps_coordinate_str){
                    var arr = typeof ps_coordinate_str == 'object' ? 
                    (
                        [ps_coordinate_str.lng, ps_coordinate_str.lat]
                    )
                    :
                    (
                        utils.isArray(ps_coordinate_str) ? ps_coordinate_str : ps_coordinate_str.split(',')
                    );
                    var lng = arr[0],
                        lat = arr[1];
                    return {
                        lng: lng,
                        lat: lat,
                        point: new BMap.Point(lng, lat)
                    }
                }
            }


            //————————————————————————————————————————————————
            // 工具库
            //————————————————————————————————————————————————
            var utils = {
                /**
                 * 弹出提示信息
                 */
                dialog: function(message) {
                    if(typeof neuiDialog != 'undefined') {
                        neuiDialog.alert({
                            message: message,
                            buttons: ['确定']
                        })
                    }
                    else {
                        alert(message);
                    }
                },

                /**
                 * 获取视窗口大小
                 */
                getViewportSize : function(){
                    var w = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth,
                        h = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
                    return {
                        width: w,
                        height: h
                    };
                },

                // 复用数组判断辅助函数
                isArray: function(arr) {
                    return Object.prototype.toString.call(arr) === '[object Array]';
                },



                /**
                 * 获取节点集合
                 * @param {String} ps_classNameId id或class名称的节点（注意：id传字符串，class无需带.）
                 * @returns {NodeList} 返回节点集合
                 */
                getMultipleNodesByIdClassName: function(ps_classNameId) {
                    var elInputClassId = ps_classNameId.toString().replace(/(\#|\.)/g, '');
                    // 1. 先尝试通过id获取单个节点
                    var elInputNode = document.getElementById(elInputClassId);
                    var nodes = [];

                    // 2. 处理节点集合：id不存在则通过class获取（querySelectorAll返回NodeList）
                    if (elInputNode) {
                        // id存在，转为数组（统一格式）
                        nodes = [elInputNode];
                    } else {
                        // id不存在，通过class获取所有匹配节点
                        // 兼容IE8+：querySelectorAll，IE6-7需用getElementsByClassName（下文补充）
                        var nodeList = document.querySelectorAll('.' + elInputClassId);
                        // 将NodeList转为数组（方便循环，兼容IE）
                        for (var i = 0; i < nodeList.length; i++) {
                            nodes.push(nodeList[i]);
                        }
                    }
                    return nodes;
                },



                /**
                 * 深度合并参数（兼容 IE6+，支持嵌套对象）
                 * @param {Object} defaults - 默认配置
                 * @param {Object} options - 用户配置
                 * @returns {Object} 合并后的新对象
                 * @example
                 * var defaults = { style: { width: 100, color: 'red' }, show: true };
                 * var options = { style: { width: 200 }, show: false };
                 * var config = deepMergeOptions(defaults, options);
                 * // 结果：{ style: { width: 200, color: 'red' }, show: false }
                 */
                deepMergeOptions: function(defaults, options) {
                    var defaultsObj = (defaults && typeof defaults === 'object' && !this.isArray(defaults)) ? defaults : {};
                    var optionsObj = (options && typeof options === 'object' && !this.isArray(options)) ? options : {};
                    var result = {};

                    // 复制默认配置
                    for (var key in defaultsObj) {
                        if (Object.prototype.hasOwnProperty.call(defaultsObj, key)) {
                            result[key] = defaultsObj[key];
                        }
                    }

                    // 深度覆盖用户配置
                    for (var optKey in optionsObj) {
                        if (Object.prototype.hasOwnProperty.call(optionsObj, optKey)) {
                            var defaultValue = result[optKey];
                            var optionValue = optionsObj[optKey];

                            // 跳过 undefined，避免覆盖默认值
                            if (optionValue === undefined) continue;

                            // 深度合并：如果两者都是对象（非数组），递归合并
                            if (
                                typeof defaultValue === 'object' && !this.isArray(defaultValue) && defaultValue !== null
                                && typeof optionValue === 'object' && !this.isArray(optionValue) && optionValue !== null
                            ) {
                                result[optKey] = this.deepMergeOptions(defaultValue, optionValue);
                            } else {
                                // 非对象直接覆盖
                                result[optKey] = optionValue;
                            }
                        }
                    }

                    return result;
                },
            };


            //————————————————————————————————————————————————
            //  暴露公共方法让前端调用
            //————————————————————————————————————————————————
            return { 
                // 暴露构造函数（支持实例化），通过 var instance = NeMapExample.MapPlugin() 实例化，拿着 instance 可调用原型方法

        //————————————————————————————————————————————————
        /**
         * 函数：查询小区
         * @param {String} ps_title 小区名称
         * @param {String} ps_longitude 小区经度坐标
         * @param {String} ps_latitude 小区纬度坐标
         */
        function fnQueryCommunity(ps_title, ps_longitude, ps_latitude) {
            if(ps_longitude != '' && ps_latitude != '')  {
                var coordinate = ps_longitude + ',' + ps_latitude;
                // 创建指定坐标的点标注

        document.getElementById('btn-copy').onclick = function() {
