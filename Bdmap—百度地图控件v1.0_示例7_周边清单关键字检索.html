        /**
         * 兼容ie和旧版edge的方案
         * 替代原生closest的兼容方法
         * @param {HTMLElement} el 起始元素（如e.target）
         * @param {String} selector 匹配选择器（类、id、标签都支持）
         * @returns {HTMLElement|null} 匹配到的元素或null
         */
        function getClosest(el, selector) {
            var currentEl = el;
            // 向上遍历直到根节点
            while (currentEl) {
                // 判断当前元素是否匹配选择器
                if (currentEl.matches ? currentEl.matches(selector) : currentEl.msMatchesSelector(selector)) {
                 return currentEl;
                }   
                // 向上找父元素
                currentEl = currentEl.parentElement;
            }
            return null;
        }

         */
        function format_data_of_last_time_search(ps_dataSource) {
            var defaultSource = { data: [] }
            if(typeof ps_dataSource.data == 'undefined') return defaultSource;
            if(ps_dataSource.data.length == 0) return defaultSource;
            var newSource = {
                data: [{
                    "fenzu_bh": "", 
                    "fenzu_mc": "", 
                    "data": []
                }]
            };
            $.each(ps_dataSource.data, function(index, item) {
                newSource.data[0].data.push(item);
            })
            return newSource;
        }

         * @param {Object} ps_dataSource 数据源对象
         */
        function create_html_list_of_group(ps_dataSource) {
            var _html = '<ul>';
            var listData = ps_dataSource.data;
            if(!Array.isArray(listData)) {
                console.error('后端JSON结构异常，已兜底\n', ps_dataSource);
                return;
            }
            $.each(listData, function(index, item){
                _html += [
                   '<li data-bh="' + item["fenzu_bh"] + '">',
                        // '<input type="radio" class="ne-checkbox circle-tick">',
                        '<span>' + item["fenzu_mc"] + '</span>',
                    '</li>'
                ].join('\r\n')
            });
            _html += '</ul>';
            if(listData.length == 0) {
                var noDataHtml = '<div class="noData_tips"> 暂无分组数据。<br>请先在快评电脑端维护楼盘附近关键字分组。<br>菜单：【楼盘区域附近 -> 附近关键字分类分组】</div>';
                $('.bds__words_record_group_list').empty().append(noDataHtml);
            }
            else {
                $('.bds__words_record_group_list').empty().append(_html);
            }
        }

         * (高度一定要设置,且不可在使用百分比进行设置,不然在.net服务器环境下地图可能不显示)

        function setDituSize(){
            var winW = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth, // 浏览器宽
                winH = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight; // 浏览器高

                allPadLeft = Math.ceil(parseFloat(eleAll.css('paddingLeft'))),
                allPadRight = Math.ceil(parseFloat(eleAll.css('paddingRight'))),
                allMargTop = Math.ceil(parseFloat(eleAll.css('marginTop'))),
                allMargBot = Math.ceil(parseFloat(eleAll.css('marginBottom'))),
                allPadTop = Math.ceil(parseFloat(eleAll.css('paddingTop'))),
                allPadBot = Math.ceil(parseFloat(eleAll.css('paddingBottom')));
            //  console.log('整个区域\nMargin左边距：',allMargLeft,'\nMargin右边距：',allMargRight,'\nPadding左边距：',allPadLeft,'\nPadding右边距：',allPadRight,'\nMargin上边距：',allMargTop,'\nMargin下边距：',allMargBot,'\nPadding上边距：',allPadTop,'\nPadding下边距：',allPadBot);
            // 顶部区域
            var eleTop = $('.bds__graph_coord'),
                topHeight = eleTop.outerHeight(true);
            // 地图区域
            var eleTu = $('.bds__graph_map'),
                tuMargTop = Math.ceil(parseFloat(eleTu.css('marginTop'))),
                tuMargLeft = Math.ceil(parseFloat(eleTu.css('marginLeft'))),
                tuMargRight = Math.ceil(parseFloat(eleTu.css('marginRight'))),
                tuPadLeft = Math.ceil(parseFloat(eleTu.css('paddingLeft'))),
                tuPadRight = Math.ceil(parseFloat(eleTu.css('paddingRight')));
                tuMargTop = Math.ceil(parseFloat(eleTu.css('marginTop'))),
                tuMargBot = Math.ceil(parseFloat(eleTu.css('marginBottom'))),
                tuPadTop = Math.ceil(parseFloat(eleTu.css('paddingTop'))),
                tuPadBot = Math.ceil(parseFloat(eleTu.css('paddingBottom')));
            // 计算宽高
            var allWidth = $('body').width() - (allMargLeft + allMargRight + allPadLeft + allPadRight),
                allHeight = $('body').height() -  (allMargTop + allMargBot + allPadTop + allPadBot),
                tuWidth = allWidth - (tuMargLeft + tuMargRight + tuPadLeft + tuPadRight),

            // console.log('tuMargLeft:',tuMargLeft,'\ntuPadLeft:',tuPadLeft,'\ntuPadLeft:',tuPadLeft,'\ntuPadRight:',tuPadRight);

            // $('.bds__graph_map_container').css({

            //     height: tuHeight
            // })
            // $('#area').css({
            //     width: eleTu.width(),
            //     height: eleTu.height()
            // })

            // 设置地图宽高
            var width = eleTu.width() - 15,
                height = width;
            var areaWidth = width,
                areaHeight = height > winH ? winH : height;
            // console.log('winH', winH, '\nheight:', height, '\nareaHeight：', areaHeight);
            // 地图父窗口宽高
            $('.bds__graph_map_container').css({
                width: width + 10,
                height: areaHeight + 10

            $('#area').css({
                width: areaWidth,
                height: areaHeight
            });
        }

        function fn_locate_city(){
            var ls_city = $('#c-city').val();
            if(ls_city == '') {
                // neuiDialog.alert({
                //     animate: true,
                //     message: '请填写：城市',
                //     buttons: ['确定']
                // })
                $('#c-city').focus();
                return;
            }
            // 数据过滤，去掉省份自治区及短横线等字符
            var cityName = ls_city.toString().replace(/(\-|\,|\s+)/g, '');
            cityName = cityName.indexOf('省') >= 0 || cityName.indexOf('自治区') >= 0 ? cityName.replace(/^(.*?省|自治区)(.*)/g, '$2') : cityName;
            // console.log("城市：", nowCityName)
            map.clearOverlays(); // 清空所有覆盖物
            // map.setCenter(nowCityName); // 定位到指定城市

            // 获取地址坐标
            var myGeo = new BMap.Geocoder(); // 创建地址解析器实例    
            myGeo.getPoint(cityName, function(point){ // 将地址解析结果显示在地图上，并调整地图视野
                // console.log('point：', point)    
                if (point) {
                    var lng = point.lng, lat = point.lat;
                    neuiBdmap.createMarker({
                        type: 'zhongxin', // 坐标类型(可选)，默认空。值： zhongxin 中心点坐标, 空 表示其它类型。
                        coordinate: lng + ',' + lat, // 坐标经纬度字符串. eg. '经度,纬度'

                        describe: '', // 描述信息(可选)，默认空。支持HTML
                        message: '', // 信息窗口短信内容(可选)，默认空
                        autoViewport: true, // 是否自动调整视野，默认true
                        zoom: 13, // 自动调整视野时地图的缩放级别，默认13。值 3-19
                        dragable: true, // 是否允许拖拽(可选)，默认false
                        finishCallback: function(e){ // 创建完成回调(可选)，默认null。返回值e为当前点标记的经纬度 { lng: 经度, lat : 纬度}
                            $('#s-community').val(''); // 小区栏清空
                            $('#c-locate').val(e.lng + ',' + e.lat); // 坐标栏赋值
                        }, 
                        dragEndCallback: function(e){ // 拖拽结束回调(可选)，默认null。返回值e为当前点标记的经纬度 { lng: 经度, lat : 纬度}
                            $('#s-community').val(''); // 小区栏清空
                            $('#c-locate').val(e.lng + ',' + e.lat); // 坐标栏赋值

         * @param {Boolean} ps_is_when_close_drop 是否为关闭下拉框操作，默认false(可选)
         */
        function fn_done_word_confirm_event(ps_is_when_close_drop) {
            var checkedSingleArr = [];
            var checkedMultipleArr = [];
            var $elNode = $('.bds__words_record_keyword_list');
            var tmp_group_mc = $elNode.parent().attr('data-group'); // 取分组名
            if(typeof tmp_group_mc == 'undefined') tmp_group_mc = '';
            var groupObj = { "team": tmp_group_mc, data: []}
            $elNode.children().find('li').each(function(){
                var $checkbox = $('input:checkbox', this),
                    $span = $('span', this),
                    $input = $('input:text', this);
                if($checkbox.prop('checked')){
                    var keyword = $span.text().toString().replace(/\s+/g, ''), // 关键字
                        distance = $input.val(); // 距离
                    if(isNaN(parseFloat(distance))) distance = DEFAULT_RANGE;
                    checkedSingleArr.push(keyword);
                    groupObj.data.push({
                        "keyword": keyword.toString(),
                        "distance": distance.toString()
                    });
                }
            });
            if(groupObj.data.length > 0) {
                checkedMultipleArr.push(groupObj);
            }
            // console.log('checkedMultipleArr：', checkedMultipleArr, '\ncheckedSingleArr：', checkedSingleArr)
            // 当当前操作是关闭下拉框时。防止点击页面其它地方时误触
            if(ps_is_when_close_drop) {
                if(checkedSingleArr.length > 0) {
                    // 更新 data-word 属性值
                    $('#s-near').val(checkedSingleArr.join(',')).attr('data-word', JSON.stringify(checkedMultipleArr));  // 设 data-word 属性值。附近项目输入框赋值 

                    // 创建当前查询的关键字列表
                    create_html_list_of_search_word(checkedMultipleArr);
                    $('.bds__search_result_outcome_switch_record').show(); // 显示当前查询的关键字列表
                    $('.bds__search_result_outcome_switch_record_title').text('预备要查询的关键字'); // 更改文字
                }
                // 统一半径复选框禁止或允许手动输入
                if( checkedSingleArr.length > 0)
                    $('#s-range').attr('disabled', true).parent().siblings().find('input:checkbox').prop('checked', false); // 禁止手动输入
                else 
                    $('#s-range').attr('disabled', false).parent().siblings().find('input:checkbox').prop('checked', true); // 允许手动输入
            }

            // 全局赋值
            var index = -1;
            $('.bds__words_method').children().each(function(idx, item) {
                if($(this).hasClass('on')) {
                    index = idx;
                    return false;
                }
            });
            if(index == 0) g_now_tab_method = 'group';
            else g_now_tab_method = 'word';
        }

        // 附近项目输入框输入事件
        $('#s-near').on('input', function(){
            var newStr = $(this).val().toString().replace(/\s+/g, '').replace(/[,:;!，：；!、。]$/g, ''), // 去掉空格、最后面的逗号等字符
                newArr = newStr.split(/[,:;!，：；！、。]/);
            var oldStr = $(this).attr('data-word'); // 取 data-word 属性值。附近项目输入框取值
            if(typeof oldStr == 'undefined') oldStr = '';
            var oldArr = oldStr.toString().replace(/\s+/g, '') == '' ? [] : JSON.parse(oldStr);
            // console.log('oldStr：', oldStr, '\noldArr：', oldArr, '\nnewArr：', newArr);

            // 实现目标：
            // 1.删除 oldArr 中 keyword 不在 newArr 的项
            // 2.跳过原始数据中已有的空分组，避免重复
            // 3.newArr 中如果关键词不存在，则补充到同一个空team里
            var resultArr = [];
            // 复制 oldArr 并过滤掉不在 newArr 里的 keyword
            for (var i = 0; i < oldArr.length; i++) {
                var oldTeam = oldArr[i];
                // 跳过原始数据中自带的空team分组，防止重复生成
                if (oldTeam.team === "") {
                    continue;
                }
                var newTeam = {
                    team: oldTeam.team,
                    data: []
                };
                for (var j = 0; j < oldTeam.data.length; j++) {
                    var item = oldTeam.data[j];
                    if (newArr.indexOf(item.keyword) !== -1) {
                        newTeam.data.push(item);
                    }
                }
                // 只保留有数据的分组
                if (newTeam.data.length > 0) {
                    resultArr.push(newTeam);
                }
            }
            // 收集 resultArr 里已有的 keyword
            var existKeywords = [];
            for (var i = 0; i < resultArr.length; i++) {
                var team = resultArr[i];
                for (var j = 0; j < team.data.length; j++) {
                    var kw = team.data[j].keyword;
                    if (existKeywords.indexOf(kw) === -1) {
                        existKeywords.push(kw);
                    }
                }
            }
            // 收集所有缺失的关键词
            var missData = [];
            for (var i = 0; i < newArr.length; i++) {
                var key = newArr[i];
                // 过滤掉空字符串关键词，避免生成 {keyword: ""}
                if (key && existKeywords.indexOf(key) === -1) {
                    missData.push({ keyword: key, distance: DEFAULT_RANGE });
                }
            }
            // 统一将缺失项放入同一个空分组
            if (missData.length > 0) {
                resultArr.push({
                    team: "",
                    data: missData
                });
            }
            // console.log("新数据 newArr：", newArr);
            // console.log("原数组 oldArr（未改动）：", oldArr);
            // console.log("处理后 resultArr：", resultArr);

            // 更新 data-word 属性值
            $(this).attr('data-word', JSON.stringify(resultArr)); // 设 data-word 属性值。附近项目输入框赋值 
        });

        // [保存结果切片] 点击某项
        $('.bds__search_result_outcome_switch_display').on('click', 'li', function(e){
            var $input = $(this).parents('.bds__search_result_outcome_switch_display_one').find('input:text, textarea');
            var now_value = $(this).text().toString().replace(/\s+/g, '').replace(/(,)/g, ' '), // 去掉空格，去掉逗号
                old_value = $input.val().toString().replace(/\s+/g, '').replace(/(,){2,}/g, ','); // 去掉空格，多个符号替换成1个逗号
            var isHighLight = $(this).hasClass('on') ? true : false;
            var new_value = '';
            if(isHighLight == false) {
                $(this).addClass('on');
                new_value = old_value + ',' + now_value; // 加上当前项
            }
            else {
                $(this).removeClass('on');
                new_value = removeMatchWord(old_value, now_value, true); // 减去当前项，精准整词匹配
            }

            new_value = new_value.replace(/\s+/g, ' '); // 多个空格替换成1个
            new_value = new_value.replace(/\s/g, ','); // 空格替换成逗号
            new_value = new_value.replace(/(;|!|\.|，|；|！|。|、)/g, ','); // 分号等字符转成逗号

            new_value = new_value.replace(/(,){2,}/g, ',').replace(/(.*),$/g, '$1').replace(/^,(.*)/g, '$1'); // 去掉多个逗号等符号，去掉结尾开头的逗号
            $input.val(new_value);
        });



        /**
         * 字符串匹配删除（兼容 IE9+）
         * 支持“精准整词匹配、模糊匹配”两种模式
         * @param {String} oldStr 原始字符串
         * @param {String} keyword 要删除的关键词
         * @param {Boolean} isExact 是否精准匹配。true=精准匹配（只删完整词），false=模糊匹配（删所有包含的）
         * @returns {String} 删除后的新字符串
         * @example
            原字符串："泉州第一医院x,泉州第一医院,泉州第一医院y"
            精准匹配：removeMatchWord(str,"泉州第一医院",true) → "泉州第一医院x,泉州第一医院y"
            模糊匹配：removeMatchWord(str,"泉州第一医院",false) → "x,,y"
         */
        function removeMatchWord(oldStr, keyword, isExact) {
            // 处理空值，避免报错
            if (!oldStr || !keyword) return oldStr;
            // 转义正则特殊字符，防止正则解析异常
            function escapeReg(str) {
                return str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            }
            var key = escapeReg(keyword);
            var reg;
            if (isExact === true) {
                reg = new RegExp(
                    "(^|[^\\u4e00-\\u9fa5a-zA-Z0-9])" + 
                    key + 
                    "(?=$|[^\\u4e00-\\u9fa5a-zA-Z0-9])",
                    "g"
                );
                return oldStr.replace(reg, "$1");
            } else {
                reg = new RegExp(key, "g");
                return oldStr.replace(reg, "");
            }
        }

        /**
         * 复制某些内容
         * @param {String} ps_str 要复制的内容
         */
        function copySomeContent(ps_str) {
            if(document.execCommand) {
                var text = ps_str; // 要复制的文本
                var input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                var message = '复制成功';
                if(typeof neuiDialog != 'undefined') {
                    neuiDialog.notice({
                        message: message,
                        theme: 'black',
                        maskOpacity: 1,
                        delay: 1300
                    })
                }
                else {
                    alert(message)
                }

            }
            else{
                var message = '你的浏览器不支持复制功能，请使用支持该功能的浏览器！';
                if(typeof neuiDialog != 'undefined') {
                    neuiDialog.alert({
                        message: message,
                        buttons: ['确定']
                    })
                }
                else {
                    alert(message);
                }
            }
        }

        /**
         * 计算两点之间的距离（Haversine公式）
         * @param {Number} lat1 - 点1纬度
         * @param {Number} lng1 - 点1经度
         * @param {Number} lat2 - 点2纬度
         * @param {Number} lng2 - 点2经度
         * @returns {Number} 返回距离（米）
         */
        function fnCalculateDistance(lat1, lng1, lat2, lng2) {
            var R = 6371000; // 地球半径（米）
            var dLat = toRad(lat2 - lat1);
            var dLng = toRad(lng2 - lng1);
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                    Math.sin(dLng / 2) * Math.sin(dLng / 2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            var val = R * c;
            return Math.round(val);
        };

        /**
         * 角度转弧度
         * @param {Number} degrees - 角度
         * @returns {Number} 弧度
         */
        function toRad(degrees) {
            return degrees * Math.PI / 180;
        };

        /**
         * 在地图上手动打点->添加点标注覆盖物
         * @param {Array} groupPoint 一组坐标点组成的数组
         */
        function fnAddMarker(groupPoint) {
            // $(".bds__graph_result").removeClass("stretch-in");
            var list = document.querySelectorAll("#panel-result2 li");
            var tempMarkers = [];
            var tempLabels = [];
            var titles = [];

            // 先从列表里把标题拿出来
            for (var i = 0; i < list.length; i++) {
                var titleNode = list[i].querySelector('.result__title');
                titles.push(titleNode.innerText || titleNode.textContent);
            }

            // 清空旧点
            map.clearOverlays();

            // 临时禁用清空，防止打点闪没
            var originalClear = map.clearOverlays;
            map.clearOverlays = function () { };

            // 添加标注点 + 自定义样式的文字标签
            // console.log('groupPoint：', groupPoint)
            for (var p = 0; p < groupPoint.length; p++) {
                var point = groupPoint[p];
                if(point instanceof BMap.Point == false) return;
                var mk = new BMap.Marker(point);
                map.addOverlay(mk);
                tempMarkers.push(mk);

                // 添加文本标注
                var label = new BMap.Label('', {
                    position: groupPoint[p],
                    offset: new BMap.Size(0, -85)  // 你调好的，不动
                });
                label.setContent(
                    '<div class="ne__bd_label_wrap">' +
                        '<div class="ne__bd_lb_text">' + titles[p] + '</div>' +
                    '</div>'
                );
                label.setStyle({
                    padding: '0',
                    margin: '0',
                    border: 'none',
                    background: 'transparent',
                    width: 'auto',
                    textAlign: 'center',
                    zIndex: 1000,
                    display: 'none' // 👈 默认隐藏所有标注
                });
                map.addOverlay(label);
                tempLabels.push(label);
                // 点击点打开弹窗（你保留，自己注释）
                mk.addEventListener("click", function (idx) {
                    return function () {
                        var infoWindow = new BMap.InfoWindow(titles[idx]);
                        map.openInfoWindow(infoWindow, tempMarkers[idx].getPosition());
                    };
                }(p));
            }

            // 恢复地图清空功能
            setTimeout(function () {
                map.clearOverlays = originalClear;
            }, 200);

            // 自动调整视野
            if (groupPoint.length > 0) {
                map.setViewport(groupPoint, {
                    zoomFactor: -2 // 缩放级别减N
                });
            }

            // 点击列表联动 —— 点击时只显示当前项标注
            for (var i = 0; i < list.length; i++) {
                list[i].onclick = null;
                list[i].setAttribute("data-index", i);
                list[i].onclick = function () {
                    var idx = parseInt(this.getAttribute("data-index"), 10);
                    // 先隐藏所有文本标注
                    for (var k = 0; k < tempLabels.length; k++) {
                        tempLabels[k].setStyle({ display: 'none' });
                    }
                    // 只显示当前点击项的标注
                    if (tempLabels[idx]) {
                        tempLabels[idx].setStyle({ display: 'block' });
                    }
                    // 地图移动到点
                    if (tempMarkers[idx]) {
                        var point = tempMarkers[idx].point;
                        if(point.lng.toString() != '0' && point.lat.toString() != '0') {
                            map.panTo(tempMarkers[idx].getPosition());
                            map.setZoom(18); // 强行缩放级别。值 3-19
                            // 显示信息窗
                            // var infoWindow = new BMap.InfoWindow(titles[idx]);
                            // map.openInfoWindow(infoWindow, tempMarkers[idx].getPosition());
                        }
                    }
                };
            }
        }

            出入可利用私家车、公交车、自行车及出租车等；周边有“幸福街口”公交站点：有1路、2路等公交线路停靠。

         */

            // console.log('ps_poi_data：', ps_poi_data, '\nps_keyword_data：', ps_keyword_data);
            // console.log('-----------');
            map.clearOverlays(); // 清空所有覆盖物
            // map.centerAndZoom(point, 13); // 调整视野
            var placeList = [], // 搜索到的地点名称组成的数组。eg. ['a小学', 'b小学', 'a医院', 'b医院']
                composeArr = [], // 关键词+搜索到的地点名称组合在一起的语句组成数组。eg. ['学校：a小学、b小学等', '医院：a医院、b医院等']
                savedArr = [], // 用于保存的数组。eg. [{'title': '学校', data: ['a小学', 'b小学']}, {'title': '医院', data: ['a医院', 'b医院']}]
                busArr = [], // 公交站点数组
                busStr = ''; // 公交组成的字符串
            for(var i = 0; i < ps_poi_data.length; i++) {
                var one = ps_poi_data[i];
                var word = one.keyword,
                    pois = one.data;
                // console.log('word：', word)
                var oneStr = '', titleArr = [], oneSaveObj = { title: word, data: []};
                // console.log('pois:', pois)
                // console.log('len:', pois.length)
                for(var k = 0; k < pois.length; k++) {
                    var poi = pois[k]; // 不知为何，有些情况下poi会是undefined
                    // console.log('poi：', poi);
                    if(typeof poi != 'undefined') {
                        // 可选：在地图上标注POI
                        // var marker = new BMap.Marker(poi.point);
                        // map.addOverlay(marker);
                        // marker.setLabel(new BMap.Label(poi.title, {offset: new BMap.Size(20, -10)}));
                        var title = poi.title, address = poi.address;
                        // console.log('address：', address)
                        placeList.push(title);
                        var save_title = '';
                        if(word.indexOf('公交') >= 0) {
                            busArr.push(title);
                            busStr += '\r\n“' + title + '”公交站点：';
                            if(address != '') {
                                busStr += '有' + address.replace(/(\;|\；|、)/g, '、') + '等公交线路停靠';
                                busStr += ( k == pois.length - 1) ? '。' : '；';
                            }
                            save_title = title + '站';
                            save_title += '(' + address.replace(/(\;|\；|、)/g, '|') + ')'; // 这里用竖线分隔符|来分隔,方便保存时改成顿号。注：竖线分隔符用于分隔公交线路
                        }
                        else {
                            titleArr.push(title);
                            save_title = title;
                        }
                        oneSaveObj.data.push(save_title);
                    }
                }
               
                oneStr += titleArr.join('、');
                oneStr += titleArr.length == 0 ? '' : ((i == ps_poi_data.length - 1) ? '。' : '等；\r\n\r\n'); 
                oneStr = (word.indexOf('公交') >= 0 ? '' : (titleArr.length == 0 ? word + '：\r\n\r\n' : word + '：')) + oneStr;
                composeArr.push(oneStr);
                savedArr.push(oneSaveObj);
            }
            // console.log('地点名称数组：', placeList, '\n结果组合数组：', composeArr, '\n要保存的数组：', savedArr);
            var serviceStr = '区域内有\r\n\r\n' + composeArr.join('');
            busStr = busStr == '' ? '' : ('\r\n出入可利用交通工具：\r\n出入可利用私家车、公交车、自行车及出租车等；周边有“' + busArr.join('、') + '”' + busArr.length + '个公交站点，公交线路如下：\r\n' + busStr);
            // 如果最后一个字符是分号则转化为句号
            var index = serviceStr.lastIndexOf('；'), length = serviceStr.length;
            if(index == length - 1) {
                serviceStr = serviceStr.substring(0, index) + '。';
            }

            // 结果输入到“查询结果”切片指定位置
            var resultStr = serviceStr + '\r\n' + busStr;
            $('#r-result').val(resultStr);

            // 创建当前查询的关键字列表
            create_html_list_of_search_word(ps_keyword_data);
            $('.bds__search_result_outcome_switch_record').show(); // 显示列表
            $('.bds__search_result_outcome_switch_record_title').text('当前查询的关键字'); // 更改文字
            // 创建“保存结果”切片数据
            create_html_list_of_saved({data: savedArr});
            $('#btn-save').show(); // 显示保存按钮
            $('.block__random_char').hide(); // 隐藏单号一栏
        }

        /**
         * 获取位置坐标：使用地理编码服务
         * 说明：
         * 1、返回值只有坐标、没有地址、电话、邮编等信息
         * 2、配额足够，1天最多5000次
         * @param {String} address 位置名称、地点名称
         * @param {String} city 指定城市
         * @param {Function} callback 回调函数。参数格式：{"point类型的坐标"}
         */
        function getAddressCoordinateByGeoCoder(address, city, callback){
            var geo = new BMap.Geocoder(); // 创建地理编码实例
            // 对指定的地址进行解析
            geo.getPoint(address, function(point) {
                if (point) {
                    // 解析成功：返回坐标
                    callback(point);
                } else {
                    // 解析失败
                    callback(null);
                }
            }, city);
        }



        /**
         * 从地点字符串中提取城市名称
         * @param {String} 地点字符串。eg. '福建省-泉州市-丰泽区', '福建省-泉州市', '福建省-泉州', '泉州市', '泉州'
         * @returns {String} 返回城市名。eg. 泉州市, 泉州
         */
        function getCityName (str) {
            // 提取城市名(支持：省-市-区/单独市/城)
            var reg = /^(?:.+?-)?([^-]+?市?)(?:-.+)?$/;
            var result = str.match(reg);
            return result ? result[1] : '';
        }
