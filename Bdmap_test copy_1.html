<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>百度地图周边配套检索 - v1.1.2</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="/test/css/demo-baidu-map.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🗺️ 百度地图周边配套检索</h1>
            <p>输入小区名称、关键词和半径，自动生成配套情况报告</p>
            <p style="font-size: 0.9em; opacity: 0.8;">版本：v1.1.2</p>
        </div>

        <!-- 配置说明 -->
        <div class="card config-card">
            <h3>⚙️ 使用前配置</h3>
            <p>请先配置百度地图API密钥（AK）。在代码中找到 <code>BAIDU_MAP_AK</code> 变量，填入你的AK。</p>
            <p style="margin-top: 8px;">获取AK：访问 <a href="http://lbsyun.baidu.com/" target="_blank" style="color: #667eea;">百度地图开放平台</a>（注意：需要申请浏览器端AK）</p>
        </div>

        <!-- 搜索表单 -->
        <div class="card">
            <div class="form-group">
                <label for="communityName">📍 小区名称</label>
                <input type="text" id="communityName" value="泉州浦西万达广场" placeholder="例如：泉州浦西万达广场">
            </div>

            <div class="form-group">
                <label for="keyword">🔍 关键词</label>
                <input type="text" id="keyword" value="学校" placeholder="例如：医院、学校、银行">
            </div>

            <div class="form-group">
                <label for="radius">📏 搜索半径（米）</label>
                <input type="number" id="radius" value="1000" min="100" max="10000">
            </div>

            <div id="errorMessage" class="alert alert-error" style="display: none;"></div>

            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn">开始搜索</button>
                <button class="btn btn-secondary" id="clearBtn">清空</button>
            </div>
        </div>

        <!-- 结果区域 -->
        <div class="card result-card" id="resultCard">
            <div class="result-header">
                <h2>📊 搜索结果</h2>
                <div>
                    <span style="color: #666; margin-right: 15px;" id="resultInfo"></span>
                    <span class="badge" id="resultCount"></span>
                </div>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="report">📄 配套报告</button>
                <button class="tab" data-tab="list">📋 详细列表</button>
            </div>

            <div class="tab-content active" id="reportTab">
                <textarea class="report-textarea" id="reportText" readonly></textarea>
                <div style="margin-top: 15px;">
                    <button class="btn btn-secondary" onclick="copyReport()">📋 复制报告</button>
                    <button class="btn btn-secondary" onclick="downloadReport()">💾 下载文件</button>
                </div>
            </div>

            <div class="tab-content" id="listTab">
                <div class="poi-list" id="poiList"></div>
            </div>
        </div>
    </div>

    <script src="/test/js/demo-baidu-map.js"></script>
</body>
</html>
